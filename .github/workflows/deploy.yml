name: Deploy to GitHub Pages

# Se ejecuta en cada push a main y permite correrlo manualmente desde la UI de Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos mínimos necesarios para el deployment oficial de Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy simultáneo; si llega uno nuevo se reemplaza el anterior en cola.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
